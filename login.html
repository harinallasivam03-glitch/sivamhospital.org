<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sign in — Unity Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/modern.css"/>
</head>
<body>
<div data-site-nav></div>

<div class="auth-wrap">
  <aside class="auth-side">
    <div>
      <a href="index.html" class="brand"><span class="brand-mark"></span><span class="brand-name">Unity<small>Hospital</small></span></a>
    </div>
    <div>
      <h2 class="text-grad">Welcome back.</h2>
      <p class="text-dim">Pick up where you left off — appointments, reports, and prescriptions, always a tap away.</p>
    </div>
    <div class="text-mute" style="font-size:13px">© Unity Hospital</div>
  </aside>

  <div class="auth-form-wrap">
    <div class="auth-form reveal">
      <h1>Sign in</h1>
      <p class="muted">New here? <a href="registration.html" style="color:var(--brand)">Create an account</a></p>
      <form data-demo>
        <div class="form-group"><label>Email</label><input type="email" class="form-control" required placeholder="you@example.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" class="form-control" required placeholder="Your password"/></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 20px">
          <label class="checkbox-row"><input type="checkbox"/> Stay signed in</label>
          <a href="#" style="color:var(--brand);font-size:14px">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Sign in</button>
      </form>
      <div style="display:flex;align-items:center;gap:10px;margin:28px 0 18px;color:var(--text-mute);font-size:12px;text-transform:uppercase;letter-spacing:.16em">
        <span style="flex:1;height:1px;background:var(--border)"></span> or <span style="flex:1;height:1px;background:var(--border)"></span>
      </div>
      <a href="#" class="btn btn-ghost" style="width:100%;justify-content:center">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="#4285f4" d="M22.5 12.2c0-.7 0-1.4-.2-2H12v3.8h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.3-4.8 3.3-7.8z"/><path fill="#34a853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.6-2.8c-1 .7-2.3 1.1-3.7 1.1-2.8 0-5.2-1.9-6.1-4.5H2.2v2.8A11 11 0 0 0 12 23z"/><path fill="#fbbc04" d="M5.9 14.1a6.6 6.6 0 0 1 0-4.2V7.1H2.2a11 11 0 0 0 0 9.8z"/><path fill="#ea4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6L19.3 4A11 11 0 0 0 2.2 7.1l3.7 2.8c.9-2.6 3.3-4.5 6.1-4.5z"/></svg>
        Continue with Google
      </a>
    </div>
  </div>
</div>

<div data-site-footer></div>
<script src="assets/js/modern.js"></script>
</body>
</html>
