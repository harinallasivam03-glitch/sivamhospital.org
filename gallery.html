<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gallery — Unity Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/modern.css"/>
</head>
<body>
<div data-site-nav></div>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb reveal"><a href="index.html">Home</a> <span>/</span> Gallery</div>
    <h1 class="reveal" data-delay="1">Inside <span class="grad">Unity.</span></h1>
    <p class="reveal" data-delay="2">Every room, every corridor, every piece of equipment — designed around you.</p>
  </div>
</section>

<section class="section-sm">
  <div class="container">
    <div class="gallery-grid">
      <div class="gallery-item gi-wide gi-tall reveal">
        <img src="assets/img/gallery/hospital.jpg" alt="Hospital"/>
        <div class="caption">The Hospital</div>
      </div>
      <div class="gallery-item reveal" data-delay="1">
        <img src="assets/img/gallery/reception.jpg" alt="Reception"/>
        <div class="caption">Reception</div>
      </div>
      <div class="gallery-item reveal" data-delay="2">
        <img src="assets/img/gallery/opd.jpg" alt="OPD"/>
        <div class="caption">OPD Area</div>
      </div>
      <div class="gallery-item reveal" data-delay="3">
        <img src="assets/img/gallery/opd2.jpg" alt="OPD 2"/>
        <div class="caption">OPD Waiting</div>
      </div>
      <div class="gallery-item reveal">
        <img src="assets/img/gallery/room1.jpg" alt="Patient Rooms"/>
        <div class="caption">Patient Rooms</div>
      </div>
      <div class="gallery-item gi-wide reveal" data-delay="1">
        <img src="assets/img/gallery/cath_lab.jpg" alt="Cath Lab"/>
        <div class="caption">Cath Laboratory</div>
      </div>
      <div class="gallery-item reveal" data-delay="2">
        <img src="assets/img/gallery/platinum_wing.jpg" alt="Platinum Wing"/>
        <div class="caption">Platinum Wing</div>
      </div>
      <div class="gallery-item reveal" data-delay="3">
        <img src="assets/img/gallery/parking.jpg" alt="Parking"/>
        <div class="caption">Parking</div>
      </div>
    </div>
  </div>
</section>

<div class="lightbox">
  <button class="close-lb" aria-label="Close">✕</button>
  <img src="" alt=""/>
</div>

<div data-site-footer></div>
<script src="assets/js/modern.js"></script>
</body>
</html>
